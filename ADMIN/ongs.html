<body>

    <div class="admin-shell">

                <p>Bem vindo</p>

            </div>

            <nav class="admin-menu">
                <a href="perfil.html" class="menu-link">
                    <span class="menu-icon">●</span>

                </a>

                <a href="usuarios.html" class="menu-link">
                    <span class="menu-icon">✦</span>

                </a>

                <a href="ongs.html" class="menu-link active">
                    <span class="menu-icon">⌂</span>
                    ONGs

                <a href="noticias.html" class="menu-link">
                    <span class="menu-icon">▣</span>
