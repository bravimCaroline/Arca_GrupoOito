<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../login.css">
    <link rel="stylesheet" href="usuarios.css">
    <link rel="stylesheet" href="adm-pages.css">
    <link rel="stylesheet" href="../ZCSS/perfil.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="dashboard">

        <aside class="sidebar" id="sidebar">

            <div class="sidebar-content">

                <div class="profile-sidebar">
                    <img src="../PNG/prefeitura.png" alt="">
                    <h3>Bem vindo<br><b>Khazix</b></h3>
                </div>

                <nav class="sidebar-menu">

                    <a href="#">
                        <i class="fa-solid fa-circle-user"></i>
                        <span>Perfil</span>
                    </a>

                    <a href="pet.html">
                        <i class="fa-solid fa-dog"></i>
                        <span>Denúncias</span>
                    </a>

                    <a href="solicitacoes.html">
                        <i class="fa-solid fa-address-card"></i>
                        <span>Solicitações</span>
                    </a>

                    <a href="ongs.html">
                        <i class="fa-solid fa-handshake-angle"></i>
                        <span>ONGs</span>
                    </a>

                    <a href="noticias.html">
                        <i class="fa-solid fa-newspaper"></i>
                        <span>Notícias</span>
                    </a>

                </nav>

            </div>

            <a href="#" class="logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Encerrar sessão</span>
            </a>
            
        </aside>

        <div class="admin-content">
            <header class="topbar">
                <button class="topbar-button" aria-label="Abrir menu">□</button>
                <img src="../PNG/logo.png" alt="Arca" class="topbar-logo">
                <a href="../index.html" class="home-link" aria-label="Home">⌂</a>
            </header>

            <main class="profile-page">
                <h1>Meu Perfil</h1>

                <section class="profile-card">
                    <div class="profile-banner"></div>

                    <div class="profile-body">
                        <div class="adm-identity">
                            <div class="profile-avatar">
                                <img src="../PNG/prefeitura.png" alt="Administrador">
                            </div>
                            <strong>Prefeitura da Serra</strong>
                        </div>

                        <div class="profile-divider"></div>
                        <h2 class="profile-section-title">Dados Administrador</h2>

                        <div class="form-grid">
                            <div class="field">
                                <label for="nome">Nome completo</label>
                                <input id="nome" type="text" value="Patinhas Felizes - Associação de Proteção Animal"
                                    readonly>
                            </div>

                            <div class="field">
                                <label for="email">E-mail institucional</label>
                                <input id="email" type="email" value="Patinhas Felizes" readonly>
                            </div>

                            <div class="field">
                                <label for="cpf">CPF</label>
                                <input id="cpf" type="text" value="12.345.678/0001-90" readonly>
                            </div>

                            <div class="field">
                                <label for="telefone">Telefone</label>
                                <input id="telefone" type="text" value="Maria Helena Souza" readonly>
                            </div>
                        </div>

                        <h2 class="tool-title">Ferramentas administrativas</h2>
                        <p class="tool-subtitle">Acesso rápido às áreas de gestão.</p>

                        <div class="tool-grid">
                            <a href="noticias.html" class="tool-card">
                                <span class="tool-icon">▣</span>
                                <span>
                                    <strong>Notícias da plataforma</strong>
                                    <span>Editar e suspender contas.</span>
                                </span>
                            </a>

                            <a href="denuncias.html" class="tool-card">
                                <span class="tool-icon">!</span>
                                <span>
                                    <strong>Denúncias</strong>
                                    <span>Visualizar denúncias</span>
                                </span>
                            </a>
                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

</body>

</html>
