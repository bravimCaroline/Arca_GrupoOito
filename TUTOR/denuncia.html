<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Denuncia</title>
     <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../ZCSS/denuncia.css">
</head>
<body>
     <header class="header flex flex-between">
        <div class="logo">
            <img src="../PNG/logo.png" alt="Logo">
        </div>

        <nav class="menu flex">
            <a href="home.html">Home</a>
            <a href="../NOTICIA/noticias.html">Notícias</a>
            <a href="../ONGs/ongs.html">ONGs</a>
            <a href="perfil.html">Perfil</a>
        </nav>
    </header>

    <section class="denuncia-banner flex flex-center">
        <div class="banner-message">
        
            <h1>Denuncie Maus-Tratos</h1>

            <p>
                Sua denúncia pode salvar a vida de um animal.
                Ajude a combater abandono, violência e negligência.
            </p>
        </div> 

        <div class="banner-animal">
            <img src="../PNG/denuncia.png" alt="Animal">
        </div>

    </section>

    <section class="denuncia-content">

        <div class="form-container card">

            <h2>Registrar denúncia</h2>

            <form id="form-denuncia">

                <div class="input-group">
                    <label>Nome</label>
                    <input type="text" placeholder="Digite seu nome">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" placeholder="Digite seu email">
                </div>

                <div class="input-group">
                    <label>Local da ocorrência</label>
                    <input type="text" placeholder="Ex: Rua, bairro, cidade">
                </div>

                <div class="input-group">
                    <label>Tipo de maus-tratos</label>

                    <select>
                        <option>Selecione</option>
                        <option>Abandono</option>
                        <option>Agressão</option>
                        <option>Falta de comida</option>
                        <option>Animal ferido</option>
                        <option>Condições inadequadas</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Descrição</label>

                    <textarea placeholder="Descreva o que aconteceu"></textarea>
                </div>

                <div class="input-group">
                    <label>Enviar imagem</label>
                    <input type="file">
                </div>

                <button type="submit" class="button button-secondary">
                    Enviar denúncia
                </button>

            </form>

        </div>

    </section>

    <footer class="footer">
        <p>© 2026 Grupo Oito, Projeto Arca CC1N UVV</p>
    </footer>


    <div id="popup-sucesso" class="popup-overlay">

        <div class="popup-success card center">

            <div class="success-icon">✓</div>

            <h2>Denúncia enviada!</h2>

            <p>
                Nossa equipe irá analisar as informações enviadas.
            </p>

        </div>

    </div>

    <script src="../ZJS/denuncia.js"></script>
    
</body>
</html>
