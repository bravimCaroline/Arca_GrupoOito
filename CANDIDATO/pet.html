<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Cachorro</title>

    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../login.css">
    <link rel="stylesheet" href="../ZCSS/perfil.css">
    <link rel="stylesheet" href="../ZCSS/pet.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="dashboard">

        <aside class="sidebar" id="sidebar">

            <div class="sidebar-content">

                <div class="profile-sidebar">
                    <img src="https://i.pravatar.cc/150?img=12" alt="">
                    <h3>Bem vindo<br><b>Khazix</b></h3>
                </div>

                <nav class="sidebar-menu">

                    <a href="perfil.html">
                        <i class="fa-solid fa-circle-user"></i>
                        <span>Perfil</span>
                    </a>

                    <a href="#" class="active-link">
                        <i class="fa-solid fa-dog"></i>
                        <span>Cadastro Pet</span>
                    </a>

                    <a href="agendamento.html">
                        <i class="fa-solid fa-calendar-days"></i>
                        <span>Agendamento</span>
                    </a>

                </nav>

            </div>

            <a href="#" class="logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Encerrar sessão</span>
            </a>

        </aside>

        <main class="main" id="main">
            <header class="topbar">
                <button class="toggle-btn" id="toggleBtn">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="logo-title">
                    <a href="../index.html">LOGO</a>
                </div>
            </header>

            <section class="content">
                <h1 class="page-title">Seus Pets</h1>
                <div class="pets-wrapper">


                    <div class="pet-list-card">
                        <h2>Lista de Pets</h2>

                        <div class="pets-table">

                            <div class="pets-table-header">
                                <span>Pet</span>
                                <span>Sexo</span>
                                <span>Tipo</span>
                                <span>Status</span>
                            </div>

                            <div class="pet-item active-pet">

                                <div class="pet-name">
                                    <img src="https://images.unsplash.com/photo-1517849845537-4d257902454a?q=80&w=200&auto=format&fit=crop">
                                    <span>pulga</span>
                                </div>

                                <span>Macho</span>
                                <span>Cachorro</span>
                                <span class="status status-warning">Solicitado</span>

                            </div>

                            

                        <button class="delete-btn">
                            <i class="fa-solid fa-trash"></i>Excluir solicitação
                        </button>

                    </div>


                </div>
            </section>

        </main>
    </div>

    <div class="popup-overlay" id="confirmOverlay">
        <div class="popup popup-success">
            <h3>Tem certeza?</h3>
            <p>Você poderá logar denovo a qualquer momento</p>
            <div class="popup-actions">
                <button class="confirm-btn" id="confirmCancel">Sim</button>
                <button class="reschedule-btn" id="closeConfirm">Não</button>
            </div>
        </div>
    </div>

    <script src="../sidebar.js"></script>
    <script src="../ZJS/deslogar.js"></script>

</body>

</html>
